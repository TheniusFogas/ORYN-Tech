<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORYN Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   ORYN EDITOR — VARIABLES & RESET
═══════════════════════════════════════════════════════ */
:root {
  --bg1:    #0a0615;
  --bg2:    #110920;
  --bg3:    #16102a;
  --panel:  #120d22;
  --border: rgba(139,92,246,.18);
  --border2: rgba(139,92,246,.1);
  --purple: #7c3aed;
  --pink:   #db2777;
  --text:   #f1eeff;
  --muted:  #b8b2d8;
  --dim:    #8a84aa;
  --sel:    rgba(124,58,237,.22);
  --hover:  rgba(255,255,255,.04);
  --topbar: 52px;
  --sidebar: 230px;
  --props:  288px;
  --canvas-bg: #1a1030;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg1);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;background:none;color:inherit;border:none;outline:none}
a{color:inherit;text-decoration:none}
.material-symbols-rounded{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20;line-height:1;vertical-align:middle;user-select:none}

/* ═══════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);
  background:rgba(10,6,21,.95);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;z-index:100;
  backdrop-filter:blur(12px);
}
.tb-logo{
  width:var(--sidebar);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:0 16px;border-right:1px solid var(--border2);
  height:100%;
}
.tb-logo-text{font-size:16px;font-weight:700;letter-spacing:.5px}
.tb-logo-text span{font-weight:400;font-size:14px;opacity:.7}
.tb-badge{
  font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);
  color:#c4b5fd;padding:2px 7px;border-radius:20px;
}
.tb-center{flex:1;display:flex;align-items:center;gap:8px;padding:0 16px}
.tb-page-select{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;font-size:13px;color:var(--text);
  cursor:pointer;min-width:160px;
}
.tb-page-select:focus{border-color:rgba(124,58,237,.5)}
.tb-url{
  font-size:11px;color:var(--dim);background:rgba(255,255,255,.04);
  border:1px solid var(--border2);border-radius:6px;
  padding:4px 10px;display:flex;align-items:center;gap:5px;
}
.tb-url .material-symbols-rounded{font-size:13px}
.tb-devices{display:flex;gap:2px;background:rgba(255,255,255,.05);border-radius:8px;padding:3px}
.tb-dev-btn{
  padding:4px 8px;border-radius:5px;font-size:11px;
  display:flex;align-items:center;gap:4px;color:var(--dim);
  transition:all .15s;
}
.tb-dev-btn .material-symbols-rounded{font-size:16px}
.tb-dev-btn.active,.tb-dev-btn:hover{background:rgba(124,58,237,.3);color:var(--text)}
.tb-right{display:flex;align-items:center;gap:6px;padding:0 14px}
.tb-undo,.tb-redo{
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--dim);transition:all .15s;font-size:16px;
}
.tb-undo:hover:not(:disabled),.tb-redo:hover:not(:disabled){background:var(--hover);color:var(--text)}
.tb-undo:disabled,.tb-redo:disabled{opacity:.3;cursor:not-allowed}
.tb-sep{width:1px;height:24px;background:var(--border2)}
.tb-status{
  font-size:11px;color:var(--dim);
  display:flex;align-items:center;gap:5px;
}
.tb-status-dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.tb-status.saved .tb-status-dot{background:#34d399}
.tb-status.unsaved .tb-status-dot{background:#fbbf24}
.tb-status.saving .tb-status-dot{background:#60a5fa;animation:pulse .8s infinite}
.tb-status.error .tb-status-dot{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-btn{
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:5px;transition:all .15s;
  letter-spacing:.3px;
}
.tb-btn .material-symbols-rounded{font-size:15px}
.tb-btn-ghost{color:var(--muted);border:1px solid var(--border)}
.tb-btn-ghost:hover{background:var(--hover);color:var(--text)}
.tb-btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
  box-shadow:0 2px 12px rgba(124,58,237,.35);
}
.tb-btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.tb-btn-preview{color:var(--muted);border:1px solid var(--border2)}
.tb-btn-preview:hover{background:var(--hover);color:var(--text)}

/* ═══════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════ */
.editor-body{
  position:fixed;top:var(--topbar);left:0;right:0;bottom:0;
  display:flex;overflow:hidden;
}

/* ═══════════════════════════════════════════════════════
   LEFT SIDEBAR — Widgets + Pages
═══════════════════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-tabs{
  display:flex;border-bottom:1px solid var(--border2);flex-shrink:0;
}
.sb-tab{
  flex:1;padding:10px 0;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;
}
.sb-tab .material-symbols-rounded{font-size:15px}
.sb-tab.active{color:var(--text);border-bottom-color:var(--purple)}
.sb-tab:hover:not(.active){color:var(--muted)}

.sidebar-panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.sidebar-panel.active{display:flex}
.sidebar-panel::-webkit-scrollbar{width:4px}
.sidebar-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Widget categories */
.sb-cat-header{
  padding:10px 14px 4px;
  font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);display:flex;align-items:center;gap:6px;
}
.sb-cat-header .material-symbols-rounded{font-size:13px}
.widget-btn{
  margin:1px 8px;padding:7px 10px;border-radius:8px;
  display:flex;align-items:center;gap:9px;
  font-size:12.5px;color:var(--muted);
  transition:all .15s;cursor:grab;
  border:1px solid transparent;
  user-select:none;
}
.widget-btn .material-symbols-rounded{font-size:17px;color:var(--dim);flex-shrink:0}
.widget-btn:hover{background:rgba(124,58,237,.12);border-color:var(--border);color:var(--text)}
.widget-btn:hover .material-symbols-rounded{color:#c4b5fd}
.widget-btn:active{cursor:grabbing}
.widget-btn.locked{opacity:.4;cursor:not-allowed}

/* Pages tab */
.pages-list{padding:8px 0}
.page-item{
  padding:8px 14px;display:flex;align-items:center;gap:8px;
  font-size:12.5px;color:var(--muted);cursor:pointer;
  border-left:2px solid transparent;transition:all .15s;
}
.page-item .material-symbols-rounded{font-size:15px;color:var(--dim)}
.page-item:hover{background:var(--hover);color:var(--text)}
.page-item.active{color:var(--text);border-left-color:var(--purple);background:rgba(124,58,237,.08)}
.page-item.active .material-symbols-rounded{color:#c4b5fd}

.sb-add-page{
  margin:6px 10px 10px;padding:8px;border-radius:9px;width:calc(100% - 20px);
  border:1px dashed var(--border);color:var(--dim);font-size:12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
}
.sb-add-page:hover{border-color:var(--purple);color:var(--text);background:rgba(124,58,237,.08)}

/* Sections list (in pages tab) */
.sections-list{padding:4px 0}
.section-row{
  padding:6px 12px;display:flex;align-items:center;gap:7px;
  font-size:11.5px;color:var(--muted);cursor:pointer;
  border-radius:7px;margin:1px 6px;transition:all .15s;
  border:1px solid transparent;
}
.section-row .material-symbols-rounded{font-size:13px;color:var(--dim)}
.section-row:hover{background:var(--hover);color:var(--text)}
.section-row.selected{background:rgba(124,58,237,.15);border-color:var(--border);color:var(--text)}
.section-row.selected .material-symbols-rounded{color:#c4b5fd}
.section-row-drag{margin-left:auto;font-size:13px;opacity:.3;cursor:grab}
.section-row-drag:active{cursor:grabbing}
.sb-sections-header{
  padding:10px 14px 4px;font-size:9.5px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--dim);
  display:flex;align-items:center;justify-content:space-between;
}

/* ═══════════════════════════════════════════════════════
   CANVAS
═══════════════════════════════════════════════════════ */
.canvas-wrap{
  flex:1;overflow:auto;background:var(--canvas-bg);
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.canvas-wrap::-webkit-scrollbar{width:8px;height:8px}
.canvas-wrap::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:4px}

.canvas-frame{
  width:100%;max-width:100%;
  background:var(--bg1);
  min-height:calc(100vh - var(--topbar));
  position:relative;
  flex-shrink:0;
  transition:max-width .25s cubic-bezier(.16,1,.3,1);
}
.canvas-frame.tablet{max-width:768px;box-shadow:0 0 0 1px var(--border),0 20px 60px rgba(0,0,0,.5)}
.canvas-frame.mobile{max-width:390px;box-shadow:0 0 0 1px var(--border),0 20px 60px rgba(0,0,0,.5)}

/* Section wrappers in canvas */
.editor-section{
  position:relative;
  border:2px solid transparent;
  transition:border-color .12s;
}
.editor-section:hover{border-color:rgba(124,58,237,.3)}
.editor-section.selected{border-color:var(--purple);border-style:solid}
.editor-section.drag-over{border-color:var(--pink);border-style:dashed}
.editor-section.drag-source{opacity:.4}

/* Section toolbar (appears on hover/select) */
.sec-toolbar{
  position:absolute;top:-1px;right:-1px;z-index:10;
  display:none;
  background:var(--purple);border-radius:0 0 0 8px;
  overflow:hidden;
}
.editor-section:hover .sec-toolbar,
.editor-section.selected .sec-toolbar{display:flex}
.sec-tb-btn{
  padding:5px 7px;color:#fff;font-size:14px;
  display:flex;align-items:center;transition:background .12s;
}
.sec-tb-btn:hover{background:rgba(255,255,255,.2)}
.sec-tb-btn.danger:hover{background:rgba(239,68,68,.6)}

/* Drop zone indicators */
.drop-zone{
  height:3px;background:linear-gradient(90deg,var(--purple),var(--pink));
  margin:0;opacity:0;transition:opacity .15s, height .15s;
  border-radius:2px;
}
.drop-zone.active{opacity:1;height:4px}

/* Empty canvas state */
.canvas-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:16px;color:var(--dim);
}
.canvas-empty .material-symbols-rounded{font-size:48px;opacity:.3}
.canvas-empty h3{font-size:18px;font-weight:600;opacity:.5}
.canvas-empty p{font-size:13px;opacity:.4}
.canvas-empty .ce-btn{
  margin-top:8px;padding:10px 20px;border-radius:10px;
  background:rgba(124,58,237,.2);border:1px solid var(--border);
  color:var(--muted);font-size:13px;display:flex;align-items:center;gap:7px;
  transition:all .15s;
}
.canvas-empty .ce-btn:hover{background:rgba(124,58,237,.3);color:var(--text)}
.canvas-empty .ce-btn .material-symbols-rounded{font-size:17px}

/* ═══════════════════════════════════════════════════════
   RIGHT PANEL — Properties
═══════════════════════════════════════════════════════ */
.props-panel{
  width:var(--props);flex-shrink:0;
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.pp-tabs{display:flex;border-bottom:1px solid var(--border2);flex-shrink:0}
.pp-tab{
  flex:1;padding:10px 0;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.pp-tab .material-symbols-rounded{font-size:14px}
.pp-tab.active{color:var(--text);border-bottom-color:var(--purple)}
.pp-tab:hover:not(.active){color:var(--muted)}

.pp-panel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.pp-panel.active{display:flex}
.pp-panel::-webkit-scrollbar{width:4px}
.pp-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Properties fields */
.pp-header{
  padding:14px 16px 10px;display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;border-bottom:1px solid var(--border2);flex-shrink:0;
}
.pp-header .material-symbols-rounded{font-size:18px;color:#c4b5fd}
.pp-fields{padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.pp-field{display:flex;flex-direction:column;gap:5px}
.pp-field-toggle{flex-direction:row;align-items:center;justify-content:space-between}
.pp-label{font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
.pp-sublabel{font-size:10px;color:var(--dim)}
.pp-input,.pp-textarea,.pp-select,.pp-code{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);
  border-radius:7px;padding:7px 10px;font-size:12.5px;color:var(--text);
  transition:border-color .15s;resize:vertical;
}
.pp-input:focus,.pp-textarea:focus,.pp-select:focus,.pp-code:focus{border-color:rgba(124,58,237,.5)}
.pp-code{font-family:'Courier New',monospace;font-size:11px;resize:vertical}
.pp-select{cursor:pointer}
.pp-range{width:100%;accent-color:var(--purple);cursor:pointer;height:4px}
.pp-range-val{font-weight:500;color:var(--muted);float:right;font-size:10px}
.pp-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.pp-switch input{opacity:0;width:0;height:0}
.pp-switch-track{
  position:absolute;inset:0;background:rgba(255,255,255,.1);
  border-radius:10px;transition:background .15s;cursor:pointer;
}
.pp-switch-track::before{
  content:'';position:absolute;left:3px;top:3px;
  width:14px;height:14px;background:#fff;border-radius:50%;
  transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.pp-switch input:checked ~ .pp-switch-track{background:var(--purple)}
.pp-switch input:checked ~ .pp-switch-track::before{transform:translateX(16px)}
.pp-color-wrap{display:flex;gap:6px;align-items:center}
.pp-color-wrap .pp-input{flex:1}
.pp-color-picker{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);cursor:pointer;padding:0;background:none}
.pp-cols-picker{display:flex;gap:4px}
.pp-col-btn{
  flex:1;padding:6px 0;border-radius:6px;font-size:12px;font-weight:600;
  background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border2);
  transition:all .15s;
}
.pp-col-btn:hover,.pp-col-btn.active{background:rgba(124,58,237,.3);border-color:var(--border);color:var(--text)}
.pp-icon-wrap{display:flex;gap:8px;align-items:center}
.pp-icon-preview{
  width:36px;height:36px;border-radius:8px;
  background:rgba(124,58,237,.2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.pp-icon-preview .material-symbols-rounded{font-size:18px;color:#c4b5fd}
.pp-icon-grid{
  display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;
  max-height:120px;overflow-y:auto;
}
.pp-icon-grid::-webkit-scrollbar{width:3px}
.pp-icon-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pp-icon-option{
  width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  color:var(--dim);transition:all .12s;border:1px solid transparent;
}
.pp-icon-option:hover,.pp-icon-option.active{background:rgba(124,58,237,.25);border-color:var(--border);color:#c4b5fd}
.pp-icon-option .material-symbols-rounded{font-size:15px}
.pp-img-upload{
  border:1px dashed var(--border);border-radius:8px;padding:16px;
  text-align:center;cursor:pointer;transition:all .15s;margin-bottom:6px;
}
.pp-img-upload:hover{border-color:var(--purple);background:rgba(124,58,237,.05)}
.pp-img-preview{max-width:100%;border-radius:6px}
.pp-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--dim);font-size:11px}
.pp-img-placeholder .material-symbols-rounded{font-size:24px}
.pp-richtext-toolbar{display:flex;gap:3px;margin-bottom:4px}
.pp-rt-btn{
  padding:3px 8px;border-radius:5px;font-size:12px;
  background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border2);
  transition:all .12s;
}
.pp-rt-btn:hover{background:rgba(124,58,237,.2);color:var(--text)}
.pp-richtext{
  background:rgba(255,255,255,.05);border:1px solid var(--border2);
  border-radius:7px;padding:8px 10px;font-size:12.5px;min-height:60px;
  line-height:1.6;
}
.pp-richtext:focus{outline:none;border-color:rgba(124,58,237,.5)}

/* Repeater */
.pp-repeater{gap:6px}
.pp-rep-item{
  background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:9px;overflow:hidden;
}
.pp-rep-header{
  padding:6px 10px;display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.03);border-bottom:1px solid var(--border2);
}
.pp-rep-drag{font-size:14px;color:var(--dim);cursor:grab}
.pp-rep-label{font-size:10.5px;font-weight:600;color:var(--dim);flex:1}
.pp-rep-del{font-size:14px;color:var(--dim);transition:color .12s}
.pp-rep-del:hover{color:#f87171}
.pp-rep-fields{padding:8px 10px;display:flex;flex-direction:column;gap:7px}
.pp-sub-field{display:flex;flex-direction:column;gap:4px}
.pp-add-item{
  padding:7px;border-radius:8px;border:1px dashed var(--border);
  color:var(--dim);font-size:11.5px;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .15s;width:100%;margin-top:2px;
}
.pp-add-item:hover{border-color:var(--purple);color:var(--text);background:rgba(124,58,237,.06)}
.pp-add-item .material-symbols-rounded{font-size:15px}
.pp-empty,.pp-locked{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:10px;color:var(--dim);text-align:center;padding:24px;
}
.pp-empty .material-symbols-rounded,.pp-locked .material-symbols-rounded{font-size:32px;opacity:.3}
.pp-empty p,.pp-locked p{font-size:12px;line-height:1.6;opacity:.6}

/* Page settings tab */
.page-settings{padding:12px}
.ps-field{margin-bottom:12px}
.ps-label{font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:5px;display:block}
.ps-input{
  width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);
  border-radius:7px;padding:7px 10px;font-size:12.5px;color:var(--text);
}
.ps-input:focus{border-color:rgba(124,58,237,.5)}
.ps-select{
  width:100%;background:rgba(21,12,46,.8);border:1px solid var(--border2);
  border-radius:7px;padding:7px 10px;font-size:12.5px;color:var(--text);cursor:pointer;
}

/* ═══════════════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════════════ */
.login-screen{
  position:fixed;inset:0;z-index:200;background:var(--bg1);
  display:flex;align-items:center;justify-content:center;
}
.login-card{
  width:380px;background:rgba(21,12,46,.9);
  border:1px solid rgba(139,92,246,.3);border-radius:20px;
  padding:40px 36px;box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.login-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
.login-logo-text{font-size:20px;font-weight:700}
.login-logo-text span{font-weight:400;opacity:.6}
.login-badge{

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:10px;font-size:12.5px;
  background:rgba(21,12,46,.96);border:1px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:8px;
  animation:toastIn .2s cubic-bezier(.16,1,.3,1);
  max-width:280px;
}
.toast .material-symbols-rounded{font-size:15px}
.toast.success{border-color:rgba(52,211,153,.3);color:#6ee7b7}
.toast.success .material-symbols-rounded{color:#34d399}
.toast.error{border-color:rgba(248,113,113,.3);color:#fca5a5}
.toast.error .material-symbols-rounded{color:#f87171}
.toast.info .material-symbols-rounded{color:#60a5fa}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  display:none;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:16px;padding:28px;min-width:360px;max-width:480px;width:90%;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
  animation:modalIn .2s cubic-bezier(.16,1,.3,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-title .material-symbols-rounded{color:#c4b5fd}
.modal-field{margin-bottom:12px}
.modal-label{font-size:10.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:5px}
.modal-input,.modal-select{
  width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px;font-size:13px;color:var(--text);
  transition:border-color .15s;
}
.modal-input:focus,.modal-select:focus{border-color:rgba(124,58,237,.5)}
.modal-select{cursor:pointer;background:rgba(21,12,46,.8)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-btn{padding:8px 18px;border-radius:8px;font-size:12.5px;font-weight:600;transition:all .15s}
.modal-btn-cancel{color:var(--dim);border:1px solid var(--border)}
.modal-btn-cancel:hover{background:var(--hover);color:var(--text)}
.modal-btn-confirm{
  background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
}
.modal-btn-confirm:hover{opacity:.9}

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
.ctx-menu{

<script type="module">
import { Editor }          from './admin/editor.js';

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const TOKEN_KEY  = 'oryn_admin_token';
let token        = null;
let currentSlug  = 'index';
let ctxTargetId  = null;

const PAGE_MAP = {
  index:     { title: 'Homepage',    url: '/index.html' },

  tutorials: { title: 'Tutoriale',    url: '/oryntech-tutorials.html' },

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
const editor = new Editor({
  onStateChange:    (state, selected) => renderCanvas(state, selected),
  onSelectionChange: (section)        => propsPanel.render(section),
  onSaveStatus:     (status)          => updateSaveStatus(status),
});

const propsPanel = new PropertiesPanel(
  document.getElementById('ppProps'),
  (id, newProps) => {
    editor.updateProps(id, newProps);
  }
);

// Override _getSection for repeater handlers
propsPanel._getSection = (id) => editor.getSection(id);

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
async function checkAuth() {
  const t = localStorage.getItem(TOKEN_KEY);
  if (!t) { showLogin(); return; }
  try {
    const res = await fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + t } });
    if (res.ok) {
      token = t;
      showEditor();
      loadPage(currentSlug);
    } else {
      localStorage.removeItem(TOKEN_KEY);
      showLogin();
    }
  } catch {
    // Offline — allow with cached token
    token = t;
    showEditor();
    loadPage(currentSlug);
  }
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('topbar').style.display      = 'none';
  document.getElementById('editorBody').style.display  = 'none';
}

function showEditor() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('topbar').style.display      = 'flex';
  document.getElementById('editorBody').style.display  = 'flex';
  buildWidgetPanel();
  buildPagesList();
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent='Completează email și parola'; errEl.style.display='block'; return; }
  btn.disabled = true;
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const json = await res.json();
    if (res.ok && json.token) {
      localStorage.setItem(TOKEN_KEY, json.token);
      token = json.token;
      showEditor();
      loadPage(currentSlug);
      toast('Autentificat cu succes!', 'success');
    } else {
      errEl.textContent = json.error || 'Eroare la autentificare';
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent = 'Eroare de conexiune';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
});

['loginEmail','loginPassword'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
});

// ═══════════════════════════════════════════════════════
// PAGE LOAD
// ═══════════════════════════════════════════════════════
async function loadPage(slug) {
  currentSlug = slug;
  updatePageUI(slug);

  // Try to load from API
  const loaded = await editor.load(slug, token);
  if (!loaded) {
    // If page not in DB yet, create empty page schema
    editor.loadPage({
      slug,
      title: PAGE_MAP[slug]?.title || slug,
      sections: [],
    });
    toast('Pagina nu are conținut în DB — începe adăugând secțiuni', 'info');
  }
  renderSectionsList();
  updatePageSettings();
}

function updatePageUI(slug) {
  document.getElementById('pageSelect').value  = slug;
  document.getElementById('tbUrlText').textContent = PAGE_MAP[slug]?.url || `/${slug}.html`;
  // Update pages list active state
  document.querySelectorAll('.page-item').forEach(el => {
    el.classList.toggle('active', el.dataset.slug === slug);
  });
}

function updatePageSettings() {
  const state = editor.state;
  if (!state) return;
  document.getElementById('psTitle').value    = state.title    || '';
  document.getElementById('psSlug').value     = state.slug     || '';
  document.getElementById('psMetaTitle').value = state.meta_title || '';
  document.getElementById('psMetaDesc').value  = state.meta_desc  || '';
  document.getElementById('psNavLoc').value   = state.nav_location || 'none';
}

// ═══════════════════════════════════════════════════════
// CANVAS RENDER
// ═══════════════════════════════════════════════════════
function renderCanvas(state, selectedId) {
  if (!state) return;
  const canvas = document.getElementById('canvasContent');
  const sections = editor.getSections();

  if (sections.length === 0) {
    canvas.innerHTML = `<div class="canvas-empty">
      <span class="material-symbols-rounded">add_circle</span>
      <h3>Pagina este goală</h3>
      <p>Adaugă prima secțiune din panoul de widgets</p>
      <button class="ce-btn" id="ceAddFirst">
        <span class="material-symbols-rounded">add</span>Adaugă secțiune
      </button>
    </div>`;
    document.getElementById('ceAddFirst')?.addEventListener('click', () => {
      document.querySelector('[data-tab="widgets"]').click();
    });
    return;
  }

  let html = '';
  sections.forEach((sec, idx) => {
    const isSelected = sec.id === selectedId;
    const def = WIDGET_DEFINITIONS[sec.type];
    const secHtml = editor.renderer.renderSection(sec);

    html += `
      <div class="drop-zone" data-drop-idx="${idx}"></div>
      <div class="editor-section ${isSelected ? 'selected' : ''}"
           data-id="${sec.id}" data-type="${sec.type}"
           draggable="true">
        <div class="sec-toolbar">
          <button class="sec-tb-btn" data-action="up" title="Mută sus">
            <span class="material-symbols-rounded">arrow_upward</span>
          </button>
          <button class="sec-tb-btn" data-action="down" title="Mută jos">
            <span class="material-symbols-rounded">arrow_downward</span>
          </button>
          <button class="sec-tb-btn" data-action="duplicate" title="Duplică">
            <span class="material-symbols-rounded">content_copy</span>
          </button>
          <button class="sec-tb-btn danger" data-action="delete" title="Șterge">
            <span class="material-symbols-rounded">delete</span>
          </button>
        </div>
        ${secHtml}
      </div>`;
  });
  html += `<div class="drop-zone" data-drop-idx="${sections.length}"></div>`;

  canvas.innerHTML = html;
  bindCanvasEvents();
  renderSectionsList();

  // Init FAQ toggles in canvas
  canvas.querySelectorAll('.faq-q').forEach(q => {
    q.addEventListener('click', () => q.closest('.faq-item').classList.toggle('open'));
  });
}

function bindCanvasEvents() {
  const canvas = document.getElementById('canvasContent');

  // Click section → select
  canvas.querySelectorAll('.editor-section').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.sec-toolbar')) return;
      e.stopPropagation();
      editor.select(el.dataset.id);
      canvas.querySelectorAll('.editor-section').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
    });

    // Right-click context menu
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      ctxTargetId = el.dataset.id;
      showCtxMenu(e.clientX, e.clientY);
    });

    // Toolbar actions
    el.querySelectorAll('.sec-tb-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const id = el.dataset.id;
        if (action === 'up')        editor.moveSection(id, 'up');
        if (action === 'down')      editor.moveSection(id, 'down');
        if (action === 'duplicate') editor.duplicateSection(id);
        if (action === 'delete')    { if (confirm('Ștergi această secțiune?')) editor.deleteSection(id); }
      });
    });

    // Drag source
    el.addEventListener('dragstart', e => {
      editor.startDrag(el.dataset.id);
      setTimeout(() => el.classList.add('drag-source'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('drag-source');
      editor.endDrag();
      canvas.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
    });
  });

  // Drop zones
  canvas.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      canvas.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
      zone.classList.add('active');
      editor.dragOver(parseInt(zone.dataset.dropIdx));
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('active');
      editor.endDrag();
    });
  });

  // Click on canvas (deselect)
  canvas.addEventListener('click', e => {
    if (!e.target.closest('.editor-section')) {
      editor.deselect();
      canvas.querySelectorAll('.editor-section').forEach(s => s.classList.remove('selected'));
    }
  });
}

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function buildWidgetPanel() {
  const panel = document.getElementById('panelWidgets');
  let html = '';
  WIDGET_CATEGORIES.forEach(cat => {
    const widgets = Object.values(WIDGET_DEFINITIONS).filter(w => w.category === cat.id);
    if (!widgets.length) return;
    html += `<div class="sb-cat-header">
      <span class="material-symbols-rounded">${cat.icon}</span>${cat.label}
    </div>`;
    widgets.forEach(w => {
      html += `<div class="widget-btn ${w.category === 'locked' ? 'locked' : ''}"
        data-type="${w.type}" draggable="${w.category !== 'locked'}" title="${w.label}">
        <span class="material-symbols-rounded">${w.icon}</span>
        ${w.label}
      </div>`;
    });
  });
  panel.innerHTML = html;

  // Widget click → add to bottom
  panel.querySelectorAll('.widget-btn:not(.locked)').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = editor.addSection(btn.dataset.type, editor.selected);
      if (id) {
        toast(`Secțiune adăugată: ${WIDGET_DEFINITIONS[btn.dataset.type]?.label}`, 'success');
        // Scroll to new section
        setTimeout(() => {
          const el = document.querySelector(`[data-id="${id}"]`);
          el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    });

    // Drag from sidebar
    btn.addEventListener('dragstart', e => {
      e.dataTransfer.setData('widget-type', btn.dataset.type);
      e.dataTransfer.effectAllowed = 'copy';
    });
  });
}

function buildPagesList() {
  const list = document.getElementById('pagesList');
  list.innerHTML = Object.entries(PAGE_MAP).map(([slug, info]) => `
    <div class="page-item ${slug === currentSlug ? 'active' : ''}" data-slug="${slug}">
      <span class="material-symbols-rounded">description</span>${info.title}
    </div>`).join('');

  list.querySelectorAll('.page-item').forEach(el => {
    el.addEventListener('click', () => {
      if (editor.dirty && !confirm('Ai modificări nesalvate. Continui?')) return;
      loadPage(el.dataset.slug);
    });
  });
}

function renderSectionsList() {
  const list = document.getElementById('sectionsList');
  if (!list) return;
  const sections = editor.getSections();
  list.innerHTML = sections.map(sec => {
    const def = WIDGET_DEFINITIONS[sec.type];
    return `<div class="section-row ${sec.id === editor.selected ? 'selected' : ''}" data-id="${sec.id}">
      <span class="material-symbols-rounded">${def?.icon || 'crop_square'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${def?.label || sec.type}
      </span>
      <span class="section-row-drag material-symbols-rounded">drag_indicator</span>
    </div>`;
  }).join('') || '<div style="padding:10px 14px;font-size:11px;color:#8a84aa">Nicio secțiune</div>';

  list.querySelectorAll('.section-row').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      editor.select(id);
      document.querySelector(`[data-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  });
}

// ═══════════════════════════════════════════════════════
// TOPBAR ACTIONS
// ═══════════════════════════════════════════════════════
// Device switcher
document.querySelectorAll('.tb-dev-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tb-dev-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const frame = document.getElementById('canvasFrame');
    frame.className = 'canvas-frame ' + (btn.dataset.device !== 'desktop' ? btn.dataset.device : '');
  });
});

// Page select
document.getElementById('pageSelect').addEventListener('change', e => {
  if (editor.dirty && !confirm('Ai modificări nesalvate. Continui?')) {
    e.target.value = currentSlug; return;
  }
  loadPage(e.target.value);
});

// Save
document.getElementById('tbSave').addEventListener('click', async () => {
  const ok = await editor.save(token);
  if (ok) toast('Salvat cu succes!', 'success');
  else    toast('Eroare la salvare', 'error');
});

// Preview
document.getElementById('tbPreview').addEventListener('click', () => {
  const url = PAGE_MAP[currentSlug]?.url || `/${currentSlug}.html`;
  window.open(url, '_blank');
});

// Undo / Redo
document.getElementById('tbUndo').addEventListener('click', () => editor.undo());
document.getElementById('tbRedo').addEventListener('click', () => editor.redo());

// Update undo/redo buttons
const origOnStateChange = editor.onStateChange;
editor.onStateChange = (state, selected) => {
  origOnStateChange(state, selected);
  document.getElementById('tbUndo').disabled = !editor.canUndo();
  document.getElementById('tbRedo').disabled = !editor.canRedo();
};

// Logout
document.getElementById('tbLogout').addEventListener('click', () => {
  if (!confirm('Te deconectezi?')) return;
  localStorage.removeItem(TOKEN_KEY);
  token = null;
  showLogin();
  toast('Deconectat', 'info');
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!token) return;
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); editor.undo(); }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'Z')  { e.preventDefault(); editor.redo(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 's')                { e.preventDefault(); editor.save(token).then(ok => { if(ok) toast('Salvat!','success'); }); }
  if (e.key === 'Escape') { editor.deselect(); hideCtxMenu(); }
  if (e.key === 'Delete' && editor.selected && !e.target.matches('input,textarea,[contenteditable]')) {
    if (confirm('Ștergi secțiunea selectată?')) editor.deleteSection(editor.selected);
  }
});

// ═══════════════════════════════════════════════════════
// PAGE SETTINGS
// ═══════════════════════════════════════════════════════
['psTitle','psMetaTitle','psMetaDesc'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    editor.updateMeta({
      title:        document.getElementById('psTitle').value,
      meta_title:   document.getElementById('psMetaTitle').value,
      meta_desc:    document.getElementById('psMetaDesc').value,

    });
  });
});
document.getElementById('psNavLoc').addEventListener('change', () => {
  editor.updateMeta({ nav_location: document.getElementById('psNavLoc').value });
});

// PP tabs
document.querySelectorAll('.pp-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.pp-tab,.pp-panel').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pp' + tab.dataset.pptab.charAt(0).toUpperCase() + tab.dataset.pptab.slice(1)).classList.add('active');
  });

// Sidebar tabs
document.querySelectorAll('.sb-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sb-tab,.sidebar-panel').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.add('active');
  });
});

// ═══════════════════════════════════════════════════════
// ADD PAGE MODAL
// ═══════════════════════════════════════════════════════
document.getElementById('btnAddPage').addEventListener('click', () => {
  document.getElementById('modalAddPage').classList.add('open');
});
document.getElementById('modalAddPageCancel').addEventListener('click', () => {
  document.getElementById('modalAddPage').classList.remove('open');
});
document.getElementById('newPageTitle').addEventListener('input', e => {
  document.getElementById('newPageSlug').value = e.target.value
    .toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
});
document.getElementById('modalAddPageConfirm').addEventListener('click', async () => {
  const title = document.getElementById('newPageTitle').value.trim();
  const slug  = document.getElementById('newPageSlug').value.trim();
  const nav   = document.getElementById('newPageNav').value;
  if (!title || !slug) { toast('Completează titlu și slug', 'error'); return; }
  try {
    const res = await fetch('/api/pages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ title, slug, nav_location: nav }),
    });
    const json = await res.json();
    if (res.ok) {
      PAGE_MAP[slug] = { title, url: `/${slug}.html` };
      const opt = document.createElement('option');
      opt.value = slug; opt.textContent = title;
      document.getElementById('pageSelect').appendChild(opt);
      document.getElementById('modalAddPage').classList.remove('open');
      buildPagesList();
      toast(`Pagina "${title}" a fost creată`, 'success');
      loadPage(slug);
    } else {
      toast(json.error || 'Eroare la creare', 'error');
    }
  } catch { toast('Eroare de rețea', 'error'); }
});

// ═══════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctxMenu');
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.classList.add('open');
  // Adjust if off-screen
  requestAnimationFrame(() => {
    const r = menu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  menu.style.left = (x - r.width)  + 'px';
    if (r.bottom > window.innerHeight) menu.style.top  = (y - r.height) + 'px';
  });
}
function hideCtxMenu() {
  document.getElementById('ctxMenu').classList.remove('open');
  ctxTargetId = null;
}
document.addEventListener('click', hideCtxMenu);
document.getElementById('ctxEdit').addEventListener('click', () => {
  if (ctxTargetId) editor.select(ctxTargetId);
});
document.getElementById('ctxMoveUp').addEventListener('click', () => {
  if (ctxTargetId) editor.moveSection(ctxTargetId, 'up');
});
document.getElementById('ctxMoveDown').addEventListener('click', () => {
  if (ctxTargetId) editor.moveSection(ctxTargetId, 'down');
});
document.getElementById('ctxDuplicate').addEventListener('click', () => {
  if (ctxTargetId) editor.duplicateSection(ctxTargetId);
});
document.getElementById('ctxCopy').addEventListener('click', () => {
  if (ctxTargetId) { editor.copySection(ctxTargetId); toast('Secțiune copiată', 'info'); }
});
document.getElementById('ctxPaste').addEventListener('click', () => {
  const id = editor.pasteSection(ctxTargetId);
  if (id) toast('Secțiune lipită', 'success');
  else    toast('Clipboard gol', 'info');
});
document.getElementById('ctxDelete').addEventListener('click', () => {
  if (ctxTargetId && confirm('Ștergi această secțiune?')) editor.deleteSection(ctxTargetId);
});

// ═══════════════════════════════════════════════════════
// SAVE STATUS
// ═══════════════════════════════════════════════════════
function updateSaveStatus(status) {
  const el = document.getElementById('tbStatus');
  const txt = document.getElementById('tbStatusText');
  el.className = 'tb-status ' + status;
  txt.textContent = {
    saved:   'Salvat',
    unsaved: 'Modificări nesalvate',
    saving:  'Se salvează...',
    error:   'Eroare salvare',
  }[status] || status;
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const wrap = document.getElementById('toastWrap');
  const icons = { success: 'check_circle', error: 'error', info: 'info' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span class="material-symbols-rounded">${icons[type] || 'info'}</span>${msg}`;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; t.style.transition = '.3s'; }, 2800);
  setTimeout(() => t.remove(), 3200);
}

// ═══════════════════════════════════════════════════════
// CANVAS DRAG FROM SIDEBAR
// ═══════════════════════════════════════════════════════
document.getElementById('canvasContent').addEventListener('dragover', e => {
  const widgetType = e.dataTransfer.types.includes('widget-type') ? 'widget' : null;
  if (widgetType) e.preventDefault();
});
document.getElementById('canvasContent').addEventListener('drop', e => {
  const type = e.dataTransfer.getData('widget-type');
  if (!type) return;
  e.preventDefault();
  const id = editor.addSection(type);
  if (id) toast(`Adăugat: ${WIDGET_DEFINITIONS[type]?.label}`, 'success');
});

// ═══════════════════════════════════════════════════════
// UNSAVED CHANGES WARNING
// ═══════════════════════════════════════════════════════
window.addEventListener('beforeunload', e => {
  if (editor.dirty) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ─── START ────────────────────────────────────────────
checkAuth();
</script>
