<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — ORYNTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
/* ─── WIDGET STYLES (Canvas) ─── */
#canvasContent .w-hero{padding:60px 40px;text-align:center;}
#canvasContent .w-hero h1{font-size:clamp(32px,4vw,52px);font-weight:800;letter-spacing:-1.5px;margin-bottom:12px;background:linear-gradient(135deg,#f1eeff,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#canvasContent .w-hero p{font-size:16px;color:var(--muted);max-width:560px;margin:0 auto 24px;}

#canvasContent .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;justify-content:center;}
#canvasContent .cat-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid rgba(139,92,246,.2);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;}
#canvasContent .cat-btn.active{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.5);color:var(--text);}

#canvasContent .course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
#canvasContent .course-card {background:rgba(21,12,46,.6);border:1px solid rgba(139,92,246,.15);border-radius:16px;overflow:hidden;}
#canvasContent .cc-thumb {position:relative;width:100%;aspect-ratio:16/9;background:#1a0f35;}
#canvasContent .cc-body {padding:20px;}
#canvasContent .cc-cat {font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;margin-bottom:8px;}
#canvasContent .cc-title {font-size:16px;font-weight:700;margin-bottom:8px;}
#canvasContent .cc-desc {font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:16px;}
#canvasContent .cc-btn {display:flex;align-items:center;gap:6px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.3);color:white;padding:6px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
#canvasContent .cc-level {position:absolute;top:10px;left:10px;font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:10px;background:rgba(0,0,0,0.5);}
#canvasContent .cc-duration {position:absolute;bottom:8px;right:10px;font-size:10.5px;font-weight:600;display:flex;align-items:center;gap:4px;}

#canvasContent .sec-title {font-size:24px;font-weight:700;margin-bottom:24px;text-align:center;}

/* Bento/Cards */
#canvasContent .w-cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;}
#canvasContent .w-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;padding:24px;}
#canvasContent .w-card-icon{font-size:32px;margin-bottom:12px;color:var(--purple);}
#canvasContent .w-card-title{font-size:18px;font-weight:700;margin-bottom:8px;}
#canvasContent .w-card-desc{font-size:14px;color:var(--muted);line-height:1.6;}

:root {
  --bg1:#0d0720;--bg2:#150c2e;--purple:#7c3aed;--violet:#6d28d9;
  --pink:#db2777;--text:#f1eeff;--muted:#b8b2d8;--dim:#8a84aa;
  --hair:rgba(255,255,255,0.08);
  --panel:#130a28;--panel2:#1a0f35;--border:rgba(139,92,246,.18);
  --accent:rgba(124,58,237,.2);--accent-h:rgba(124,58,237,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--bg1);color:var(--text);}
button,input,select,textarea{font-family:'Outfit',sans-serif;}

/* ─── TOPBAR ─── */
.adm-top{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:300;
  background:rgba(13,7,32,.95);border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
  display:flex;align-items:center;padding:0 16px;gap:12px;
}
.adm-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);flex-shrink:0;}
.hb-logo-text{font-family:'Outfit',sans-serif;font-size:22px;color:#fff;line-height:1;position:relative;}
.hb-logo-text .oryn{font-weight:700;letter-spacing:2px;text-transform:uppercase;position:relative;}
.hb-logo-text .tech{font-weight:500;letter-spacing:1.2px;}
.oryn-comet{position:absolute;inset:0;pointer-events:none;width:100%;height:100%;}
.globe-wrap{position:relative;width:48px;height:48px;flex-shrink:0;}
.globe-canvas{position:absolute;inset:0;width:44px;height:44px;display:block;}
.adm-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.adm-page-select{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:5px 10px;font-size:12.5px;
  cursor:pointer;min-width:140px;
}
.adm-page-select option{background:#150c2e;}
.adm-device-btns{display:flex;gap:2px;background:rgba(255,255,255,.04);border-radius:8px;padding:3px;}
.adm-dev-btn{
  width:30px;height:26px;border-radius:6px;border:none;
  background:none;color:var(--dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.adm-dev-btn.active,.adm-dev-btn:hover{background:var(--accent);color:var(--text);}
.adm-dev-btn .material-symbols-rounded{font-size:15px;}
.adm-spacer{flex:1;}
.adm-status{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px;}
.adm-status-dot{width:6px;height:6px;border-radius:50%;background:#10b981;}
.adm-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;border:none;transition:all .15s;
}
.adm-btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);}
.adm-btn-ghost:hover{background:rgba(255,255,255,.1);color:var(--text);}
.adm-btn-primary{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;}
.adm-btn-primary:hover{opacity:.9;}
.adm-btn .material-symbols-rounded{font-size:14px;}

/* ─── LAYOUT ─── */
.adm-body{
  position:fixed;top:52px;bottom:0;left:0;right:0;
  display:grid;grid-template-columns:220px 1fr 280px;
}

/* ─── LEFT PANEL ─── */
.adm-left{
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.adm-left-tabs{display:flex;border-bottom:1px solid var(--border);}
.adm-ltab{
  flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;color:var(--dim);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;
}
.adm-ltab.active{color:var(--text);border-bottom-color:var(--purple);}
.adm-left-body{flex:1;overflow-y:auto;padding:12px;}
.adm-left-body::-webkit-scrollbar{width:4px;}
.adm-left-body::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:4px;}

.page-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:8px;
  border:1px solid transparent;cursor:pointer;
  transition:all .15s;font-size:12.5px;
}
.page-item:hover{background:var(--accent);border-color:var(--border);}
.page-item.active{background:var(--accent-h);border-color:rgba(124,58,237,.4);}
.page-item .material-symbols-rounded{font-size:15px;color:var(--dim);}
.page-item-name{flex:1;}
.page-item-badge{
  font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:6px;
  background:rgba(139,92,246,.2);color:rgba(167,139,250,.8);
}
.widget-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:8px;
  border:1px solid transparent;cursor:pointer;
  transition:all .15s;font-size:12.5px;color:var(--muted);
}
.widget-item:hover{background:var(--accent);border-color:var(--border);color:var(--text);}
.widget-item .material-symbols-rounded{font-size:16px;color:var(--dim);}

/* ─── CANVAS ─── */
.adm-canvas{
  background:rgba(0,0,0,.25);
  display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;overflow-x:hidden;
  padding:24px;
}
.adm-canvas::-webkit-scrollbar{width:6px;}
.adm-canvas::-webkit-scrollbar-thumb{background:rgba(139,92,246,.2);border-radius:4px;}
.canvas-frame{
  background:var(--bg1);
  width:100%;max-width:1100px;min-height:700px;
  border-radius:12px;border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
  transition:max-width .3s;
}
.canvas-frame.mobile{max-width:390px;}
.canvas-frame.tablet{max-width:768px;}

#canvasContent{width:100%;min-height:700px;background:#fff;color:#000;}

.edit-mode-bar{
  padding:8px 16px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(219,39,119,.1));
  border-bottom:1px solid rgba(124,58,237,.25);
  font-size:12px;color:rgba(192,132,252,.9);
}
.edit-mode-bar span.page-url{font-family:monospace;font-size:11px;background:rgba(0,0,0,.3);padding:3px 8px;border-radius:6px;color:var(--muted);}

/* Section selection in canvas */
.sec { position:relative; border:2px solid transparent; transition:border-color .15s; }
.sec:hover { border-color:rgba(124,58,237,.3); cursor:pointer; }
.sec.selected { border-color:var(--purple); border-style:solid; }
[data-editable="true"]:hover { outline: 2px dashed var(--purple); outline-offset: 2px; }

/* ─── RIGHT PANEL ─── */
.adm-right{
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.adm-right-head{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.adm-right-title{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);}
.adm-right-body{flex:1;overflow-y:auto;padding:16px;}
.adm-right-body::-webkit-scrollbar{width:4px;}
.adm-right-body::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:4px;}

/* Properties Panel Styles */
.prop-group { margin-bottom:20px; }
.prop-label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.prop-input, .prop-textarea, .prop-select { width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px 12px; font-size:13px; outline:none; transition:all .2s; font-family:inherit; }
.prop-input:focus, .prop-textarea:focus, .prop-select:focus { border-color:var(--purple); background:rgba(255,255,255,0.05); }

/* Toasts */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);
  color:#6ee7b7;font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:10px;z-index:600;
  transition:transform .3s cubic-bezier(.16,1,.3,1);
  display:flex;align-items:center;gap:7px;opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* Modals */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:16px;padding:28px;width:420px;max-width:90vw;
}

/* Auth */
.login-screen { position:fixed; inset:0; background:var(--bg1); z-index:1000; display:flex; align-items:center; justify-content:center; }
.login-card { width:100%; max-width:400px; background:var(--panel2); border:1px solid var(--border); border-radius:24px; padding:40px; box-shadow:0 40px 100px rgba(0,0,0,0.8); }

/* Globe Anim (Logo) */
.globe-wrap{ position:relative;width:48px;height:48px;flex-shrink:0; }
.globe-canvas{ position:absolute;inset:2px;width:44px;height:44px;display:block; }
.hb-logo-text{ font-family:'Outfit',sans-serif;font-size:22px;color:#fff;line-height:1;position:relative;display:flex;align-items:center; }
.hb-logo-text .oryn{ font-weight:700;letter-spacing:2px;text-transform:uppercase; }
.hb-logo-text .tech{ font-weight:500;letter-spacing:1.2px;color:rgba(255,255,255,.7); }

</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:32px;">
       <div style="font-size:24px;font-weight:800;letter-spacing:1px;">ORYN<span style="color:var(--purple);">Tech</span></div>
       <div style="font-size:14px;color:var(--dim);margin-top:4px;">Editor Admin</div>
    </div>
    <div id="loginError" style="background:rgba(239,68,68,0.1);color:#fca5a5;padding:12px;border-radius:8px;font-size:13px;margin-bottom:20px;display:none;"></div>
    <div class="prop-group">
      <label class="prop-label">Utilizator</label>
      <input class="prop-input" type="text" id="loginUser" placeholder="admin">
    </div>
    <div class="prop-group">
      <label class="prop-label">Parolă</label>
      <input class="prop-input" type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="adm-btn adm-btn-primary" style="width:100%;height:44px;justify-content:center;" id="loginBtn">Intră în Admin</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="adm-top" style="display:none;">
    <a href="/" class="hb-logo">
      <div class="globe-wrap"><canvas class="globe-canvas" id="logoCanvas"></canvas></div>
      <span class="hb-logo-text"><span class="oryn" id="orynSpan"><canvas id="orynComet" class="oryn-comet"></canvas>ORYN</span><span class="tech">Tech</span></span>
    </a>
    <div class="adm-sep"></div>
    <select class="adm-page-select" id="pageSelect">
      <!-- Dynamically filled -->
    </select>
    <div class="adm-sep"></div>
    <div class="adm-device-btns">
      <button class="adm-dev-btn active" data-device="desktop"><span class="material-symbols-rounded">desktop_windows</span></button>
      <button class="adm-dev-btn" data-device="tablet"><span class="material-symbols-rounded">tablet</span></button>
      <button class="adm-dev-btn" data-device="mobile"><span class="material-symbols-rounded">smartphone</span></button>
    </div>
    <div class="adm-spacer"></div>
    <div class="adm-status"><div class="adm-status-dot" id="saveDot"></div><span id="statusText">Se încarcă...</span></div>
    <div class="adm-sep"></div>
    <button class="adm-btn adm-btn-ghost" id="openPreviewBtn"><span class="material-symbols-rounded">visibility</span>Preview</button>
    <button class="adm-btn adm-btn-ghost" id="saveBtn"><span class="material-symbols-rounded">save</span>Salvează</button>
    <button class="adm-btn adm-btn-primary" id="publishBtn"><span class="material-symbols-rounded">publish</span>Publică</button>
</div>

<!-- MAIN BODY -->
<div class="adm-body" style="display:none;">
    <!-- SIDEBAR -->
    <div class="adm-left">
        <div class="adm-left-tabs">
            <div class="adm-ltab active" data-ltab="pages">Pagini</div>
            <div class="adm-ltab" data-ltab="widgets">Widget-uri</div>
            <div class="adm-ltab" data-ltab="settings">Setări</div>
        </div>
        <div class="adm-left-body">
            <div id="pagesTab"></div>
            <div id="widgetsTab" style="display:none;"></div>
            <div id="settingsTab" style="display:none;">
                <div class="prop-group">
                    <label class="prop-label">Titlu Pagina (SEO)</label>
                    <input class="prop-input" type="text" id="seoTitle" placeholder="Ex: Prima pagina - ORYNTech">
                </div>
                <div class="prop-group">
                    <label class="prop-label">Meta Descriere</label>
                    <textarea class="prop-input" id="seoDesc" rows="5" placeholder="Descrierea paginii pentru Google..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- CANVAS -->
    <div class="adm-canvas">
        <div class="canvas-frame" id="canvasFrame">
            <div class="edit-mode-bar">
                <span class="material-symbols-rounded">edit</span>
                Editezi: <strong id="currentPageLabel">...</strong>
                <span class="page-url" id="currentPageUrl">/...</span>
            </div>
            <div id="canvasContent"></div>
        </div>
    </div>

    <!-- PROPERTIES -->
    <div class="adm-right">
        <div class="adm-right-head">
            <span class="adm-right-title">Proprietăți</span>
            <span class="material-symbols-rounded" style="font-size:18px;color:var(--dim);">settings_suggest</span>
        </div>
        <div class="adm-right-body" id="propBody"></div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="material-symbols-rounded">check_circle</span>
  <span id="toastMsg"></span>
</div>

<script type="module">
import Editor           from './admin/editor.js';
import PropertiesPanel   from './admin/properties.js';
import WIDGET_DEFINITIONS from './admin/widgets/definitions.js';

const TOKEN_KEY = 'oryn_admin_token';
let editor, propPanel;

async function checkAuth() {
    // LOGIN BYPASS ACTIVATED
    hideLoginScreen();
    initApp();
}

function hideLoginScreen() {
    document.getElementById('loginScreen').style.display = 'none';
    document.querySelector('.adm-top').style.display = 'flex';
    document.querySelector('.adm-body').style.display = 'grid';
}

function initApp() {
    editor = new Editor({
        onStateChange: () => {
            renderCanvas();
            updateSaveStatus(editor.dirty ? 'dirty' : 'saved');
        },
        onSelectionChange: (section, prop) => {
            propPanel.render(section);
            if (prop) propPanel.scrollToField(prop);
            document.querySelectorAll('.sec').forEach(s => {
                s.classList.toggle('selected', s.dataset.sectionId === section?.id);
            });
        },
        onSaveStatus: (s) => updateSaveStatus(s)
    });

    propPanel = new PropertiesPanel(document.getElementById('propBody'), (id, props) => {
        editor.updateProps(id, props);
    });

    initUI();
    loadPages();
}

function renderCanvas() {
    const container = document.getElementById('canvasContent');
    if (!container) return;
    container.innerHTML = editor.renderHTML();
    container.querySelectorAll('.sec').forEach(sec => {
        sec.onclick = (e) => { e.stopPropagation(); editor.select(sec.dataset.sectionId); };
        sec.querySelectorAll('[data-editable="true"]').forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); editor.select(sec.dataset.sectionId, el.dataset.prop); };
        });
    });
}

async function loadPages() {
    const list = document.getElementById('pagesTab');
    const select = document.getElementById('pageSelect');
    try {
        console.log('[Editor] Fetching pages...');
        const res = await fetch('/api/pages');
        if (!res.ok) throw new Error('Fetch failed: ' + res.status);
        const pages = await res.json();
        console.log('[Editor] Pages loaded:', pages);
        list.innerHTML = '';
        select.innerHTML = '';
        pages.forEach(p => {
            const div = document.createElement('div');
            div.className = 'page-item';
            div.dataset.slug = p.slug;
            div.onclick = () => selectPage(p.slug, div);
            div.innerHTML = `<span class="material-symbols-rounded">${p.slug==='index'?'home':'article'}</span><span class="page-item-name">${p.title||p.slug}</span><span class="page-item-badge">${p.is_published?'Public':'Draft'}</span>`;
            list.appendChild(div);

            const opt = document.createElement('option');
            opt.value = p.slug; opt.textContent = p.title || p.slug;
            select.appendChild(opt);
        });
        if(pages.length) selectPage(pages[0].slug, list.firstChild);
    } catch(e) { 
        console.error('[Editor] Load pages error:', e);
        list.innerHTML = `<div style="padding:20px;color:rgba(255,100,100,0.8);font-size:12px;">Eroare la încărcarea paginilor.<br><br><code style="font-size:10px;opacity:0.7;">${e.message}</code></div>`;
    }
}

async function selectPage(slug, el) {
    document.querySelectorAll('.page-item').forEach(i => i.classList.remove('active'));
    if(el) el.classList.add('active');
    document.getElementById('pageSelect').value = slug;
    document.getElementById('currentPageLabel').textContent = slug.charAt(0).toUpperCase() + slug.slice(1);
    document.getElementById('currentPageUrl').textContent = '/' + slug;
    const pageData = await editor.load(slug);
    if (pageData) {
        document.getElementById('seoTitle').value = pageData.meta_title || pageData.title || '';
        document.getElementById('seoDesc').value = pageData.meta_desc || '';
    }
}

function initUI() {
    // Tabs
    document.querySelectorAll('.adm-ltab').forEach(t => {
        t.onclick = () => {
            document.querySelectorAll('.adm-ltab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            const tab = t.dataset.ltab;
            document.getElementById('pagesTab').style.display = tab === 'pages' ? 'block' : 'none';
            document.getElementById('widgetsTab').style.display = tab === 'widgets' ? 'block' : 'none';
            document.getElementById('settingsTab').style.display = tab === 'settings' ? 'block' : 'none';
        };
    });

    // SEO Sync
    document.getElementById('seoTitle').oninput = (e) => {
        if (editor.state) editor.updateMeta({ meta_title: e.target.value });
    };
    document.getElementById('seoDesc').oninput = (e) => {
        if (editor.state) editor.updateMeta({ meta_desc: e.target.value });
    };

    // Widgets
    const wtab = document.getElementById('widgetsTab');
    Object.entries(WIDGET_DEFINITIONS).forEach(([type, def]) => {
        if(def.category === 'locked') return;
        const div = document.createElement('div');
        div.className = 'widget-item';
        div.innerHTML = `<span class="material-symbols-rounded">${def.icon}</span><span>${def.label}</span>`;
        div.onclick = () => editor.addSection(type);
        wtab.appendChild(div);
    });

    // Devices
    document.querySelectorAll('.adm-dev-btn').forEach(b => {
        b.onclick = () => {
            document.querySelectorAll('.adm-dev-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            document.getElementById('canvasFrame').className = 'canvas-frame ' + (b.dataset.device==='desktop'?'':b.dataset.device);
        };
    });

    // Global
    document.getElementById('pageSelect').onchange = (e) => selectPage(e.target.value);
    document.getElementById('saveBtn').onclick = () => editor.save().then(s => s && showToast('Salvat ✓'));
    document.getElementById('publishBtn').onclick = () => showToast('Publicat ✓');
    document.getElementById('openPreviewBtn').onclick = () => { if(editor.state) window.open('/'+editor.state.slug, '_blank'); };
}

function updateSaveStatus(s) {
    const d = document.getElementById('saveDot'), t = document.getElementById('statusText');
    if(!d || !t) return;
    if(s==='dirty') { t.textContent = 'Nesalvat'; d.style.background = '#f59e0b'; }
    else if(s==='saving') { t.textContent = 'Se salvează...'; d.style.background = '#3b82f6'; }
    else { t.textContent = 'Salvat ✓'; d.style.background = '#10b981'; }
}

function showToast(m) {
    const t = document.getElementById('toast'), msg = document.getElementById('toastMsg');
    msg.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ─── LOGO GLOBE CANVAS ─── */
(function(){
  const cv = document.getElementById('logoCanvas');
  if(!cv) return;

  const SIZE = 44; 
  let DPR = 1;

  function setupCanvas() {
    DPR = Math.min(window.devicePixelRatio || 1, 4);
    cv.width  = Math.round(SIZE * DPR);
    cv.height = Math.round(SIZE * DPR);
    cv.style.width  = SIZE + 'px';
    cv.style.height = SIZE + 'px';
    cv.style.imageRendering = 'crisp-edges';
  }
  setupCanvas();
  window.addEventListener('resize', setupCanvas);

  const ctx = cv.getContext('2d', { alpha: true });
  const CX = SIZE/2, CY = SIZE/2, R = 11.2;

  const NODES = [[0.5, 0.3], [0.55,2.1], [0.6, 4.0], [1.05,0.9], [1.0, 2.6], [1.1, 4.5], [1.0,5.8], [1.6, 1.5], [1.55,3.3], [1.7, 5.1], [2.2, 2.2]];
  const EDGES = [[0,3],[0,1],[1,4],[1,3],[2,5],[2,6],[3,4],[3,7],[4,5],[4,8],[5,6],[5,9],[6,9],[7,8],[7,10],[8,9],[8,10],[9,10]];
  const SPIN = 0.07; const TILT = 0.40;

  function proj(phi, th) {
    const gx = Math.sin(phi)*Math.sin(th);
    const gy = Math.cos(phi);
    const gz = Math.sin(phi)*Math.cos(th);
    const sy =  gy*Math.cos(TILT) - gz*Math.sin(TILT);
    const sz =  gy*Math.sin(TILT) + gz*Math.cos(TILT);
    return { x: CX+gx*R, y: CY-sy*R, z: sz };
  }

  function greatArc(phi1,th1, phi2,th2, steps) {
    const v1=[Math.sin(phi1)*Math.sin(th1), Math.cos(phi1), Math.sin(phi1)*Math.cos(th1)];
    const v2=[Math.sin(phi2)*Math.sin(th2), Math.cos(phi2), Math.sin(phi2)*Math.cos(th2)];
    const dot=Math.max(-1,Math.min(1, v1[0]*v2[0]+v1[1]*v2[1]+v1[2]*v2[2]));
    const omega=Math.acos(dot);
    const pts=[];
    for(let i=0;i<=steps;i++){
      const t=i/steps;
      let vx,vy,vz;
      if(omega<0.001){vx=v1[0];vy=v1[1];vz=v1[2];}
      else{
        const sa=Math.sin((1-t)*omega)/Math.sin(omega);
        const sb=Math.sin(t*omega)/Math.sin(omega);
        vx=sa*v1[0]+sb*v2[0]; vy=sa*v1[1]+sb*v2[1]; vz=sa*v1[2]+sb*v2[2];
      }
      const sy=vy*Math.cos(TILT)-vz*Math.sin(TILT);
      const sz=vy*Math.sin(TILT)+vz*Math.cos(TILT);
      pts.push({x:CX+vx*R, y:CY-sy*R, z:sz});
    }
    return pts;
  }

  const pulses=EDGES.map((_,i)=>({t:-(i/EDGES.length), spd:0.14+Math.random()*0.22}));
  const OA_DIAG = (R+6.5) * 0.707; const OB = R*1.1; 
  let orbitAngle = Math.PI; let smoothH = 0;
  const TAIL = 28; const tailX=new Float32Array(TAIL).fill(CX); const tailY=new Float32Array(TAIL).fill(CY); const tailA=new Float32Array(TAIL).fill(0);
  let tPtr=0, tFill=0;

  function pushTail(x,y,op){ tailX[tPtr]=x; tailY[tPtr]=y; tailA[tPtr]=op; tPtr=(tPtr+1)%TAIL; if(tFill<TAIL) tFill++; }

  function drawTail() {
    if(tFill<3) return;
    ctx.save();
    ctx.lineCap='round';
    for(let i=1;i<Math.min(tFill,TAIL)-1;i++){
      const a=(tPtr-i+TAIL)%TAIL; const b=(tPtr-i-1+TAIL)%TAIL;
      const t=i/(TAIL-1); const headOp=tailA[(tPtr-1+TAIL)%TAIL]; const segAlpha=(1-t)*headOp*0.55;
      if(segAlpha<0.01) continue;
      const w=Math.max(0.2,(1-t)*2.0);
      ctx.beginPath(); ctx.moveTo(tailX[b],tailY[b]); ctx.lineTo(tailX[a],tailY[a]);
      ctx.strokeStyle=`rgba(220,170,255,${segAlpha})`; ctx.lineWidth=w; ctx.stroke();
    }
    ctx.restore();
  }

  function rocketState(dt) {
    orbitAngle += dt * 0.9;
    const a  = orbitAngle; const ca = Math.cos(a), sa = Math.sin(a);
    const screenX = CX + ca * OA_DIAG; const screenY = CY - ca * OA_DIAG;
    const depth    = -sa * OB; const isBehind = depth < -OB * 0.05;
    const normDepth = (depth + OB) / (2 * OB);
    const scale     = 0.32 + normDepth * 0.68;
    const opacity   = isBehind ? Math.max(0, normDepth * 0.35) : Math.max(0.08, normDepth * 0.95 + 0.05);
    const tdx = -sa * OA_DIAG; const tdy =  sa * OA_DIAG;
    const rawH = Math.atan2(tdy, tdx) + Math.PI/2;
    let diff = rawH - smoothH;
    while(diff >  Math.PI) diff -= 2*Math.PI;
    while(diff < -Math.PI) diff += 2*Math.PI;
    smoothH += diff * 0.08;
    return {x:screenX, y:screenY, h:smoothH, isBehind, opacity, scale, depth, normDepth};
  }

  function drawRocket(rk) {
    const sz=4.0*rk.scale; const op=rk.opacity;
    if(op<0.03||sz<0.3) return;
    ctx.save(); ctx.globalAlpha=op*0.45; ctx.translate(rk.x,rk.y);
    const gg=ctx.createRadialGradient(0,0,0,0,0,sz*1.8);
    gg.addColorStop(0,'rgba(240,171,252,0.5)'); gg.addColorStop(1,'rgba(124,58,237,0)');
    ctx.beginPath(); ctx.arc(0,0,sz*1.8,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill(); ctx.restore();
    ctx.save(); ctx.globalAlpha=op; ctx.translate(rk.x,rk.y); ctx.rotate(rk.h);
    if(!rk.isBehind && op>0.3){
      const fg=ctx.createLinearGradient(0,sz*0.4,0,sz*1.8);
      fg.addColorStop(0,`rgba(251,191,36,${op*0.85})`); fg.addColorStop(0.5,`rgba(248,100,100,${op*0.5})`); fg.addColorStop(1,'rgba(139,92,246,0)');
      ctx.beginPath(); ctx.moveTo(-sz*0.18,sz*0.4); ctx.bezierCurveTo(-sz*0.28,sz*0.88,sz*0.28,sz*0.88,sz*0.18,sz*0.4); ctx.bezierCurveTo(sz*0.08,sz*1.7,-sz*0.08,sz*1.7,-sz*0.18,sz*0.4); ctx.fillStyle=fg; ctx.fill();
    }
    const bg=ctx.createLinearGradient(0,-sz,0,sz*0.6);
    bg.addColorStop(0,`rgba(240,171,252,${op*0.72})`); bg.addColorStop(1,`rgba(109,40,217,${op*0.52})`);
    ctx.beginPath(); ctx.moveTo(0,-sz); ctx.bezierCurveTo(sz*0.46,-sz*0.2,sz*0.46,sz*0.34,sz*0.24,sz*0.56); ctx.lineTo(-sz*0.24,sz*0.56); ctx.bezierCurveTo(-sz*0.46,sz*0.34,-sz*0.46,-sz*0.2,0,-sz); ctx.fillStyle=bg; ctx.fill();
    ctx.beginPath(); ctx.moveTo(sz*0.22,sz*0.32); ctx.lineTo(sz*0.54,sz*0.64); ctx.lineTo(sz*0.24,sz*0.56); ctx.fillStyle=`rgba(168,85,247,${op*0.46})`; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-sz*0.22,sz*0.32); ctx.lineTo(-sz*0.54,sz*0.64); ctx.lineTo(-sz*0.24,sz*0.56); ctx.fillStyle=`rgba(168,85,247,${op*0.46})`; ctx.fill();
    const wg=ctx.createRadialGradient(-sz*0.05,-sz*0.04,0,0,0,sz*0.22);
    wg.addColorStop(0,`rgba(255,255,255,${op*0.3})`); wg.addColorStop(1,`rgba(192,132,252,${op*0.07})`);
    ctx.beginPath(); ctx.arc(0,sz*0.06,sz*0.22,0,Math.PI*2); ctx.fillStyle=wg; ctx.fill(); ctx.restore();
  }

  let lastTS=null;
  function draw(ts){
    const dt=lastTS===null?0.016:Math.min((ts-lastTS)/1000,0.05); lastTS=ts;
    ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,SIZE,SIZE);
    const spin=orbitAngle*SPIN; const pn=NODES.map(([phi,th])=>proj(phi,th+spin)); const rk=rocketState(dt); pushTail(rk.x,rk.y,rk.opacity);
    const halo=ctx.createRadialGradient(CX,CY,R*0.3,CX,CY,R*1.65); halo.addColorStop(0,'rgba(109,40,217,0.22)'); halo.addColorStop(0.55,'rgba(139,92,246,0.09)'); halo.addColorStop(1,'rgba(109,40,217,0)');
    ctx.beginPath(); ctx.arc(CX,CY,R*1.65,0,Math.PI*2); ctx.fillStyle=halo; ctx.fill();
    const gf=ctx.createRadialGradient(CX-3,CY-3.5,0.5,CX,CY,R); gf.addColorStop(0,'rgba(192,132,252,0.16)'); gf.addColorStop(0.55,'rgba(109,40,217,0.08)'); gf.addColorStop(1,'rgba(55,48,163,0.04)');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=gf; ctx.fill();
    if(rk.isBehind){ drawTail(); drawRocket(rk); }
    EDGES.forEach(([ai,bi],ei)=>{
      const na=NODES[ai], nb=NODES[bi]; const za=pn[ai].z, zb=pn[bi].z; const avgZ=(za+zb)*0.5; if(avgZ<-0.12) return; const vis=Math.max(0,Math.min(1,(avgZ+0.12)/0.88));
      const pts=greatArc(na[0],na[1]+spin,nb[0],nb[1]+spin,8);
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); for(let k=1;k<pts.length;k++) ctx.lineTo(pts[k].x,pts[k].y);
      ctx.strokeStyle=`rgba(167,139,250,${vis*0.70})`; ctx.lineWidth=0.55; ctx.stroke();
      const p=pulses[ei]; p.t+=p.spd*dt; if(p.t>1.18){p.t=-0.06; p.spd=0.12+Math.random()*0.24;}
      const pt=Math.max(0,Math.min(1,p.t)); if(pt<=0||pt>=1) return;
      const fi=pt*(pts.length-1); const i0=Math.floor(fi),i1=Math.min(i0+1,pts.length-1); const fr=fi-i0; const hx=pts[i0].x+(pts[i1].x-pts[i0].x)*fr; const hy=pts[i0].y+(pts[i1].y-pts[i0].y)*fr; const hz=pts[i0].z+(pts[i1].z-pts[i0].z)*fr;
      const df=Math.max(0.1,(hz+0.5)/1.3); const ti=Math.max(0,i0-2); const tx=pts[ti].x,ty=pts[ti].y; if(Math.abs(hx-tx)<0.001&&Math.abs(hy-ty)<0.001) return;
      const lg=ctx.createLinearGradient(tx,ty,hx,hy); lg.addColorStop(0,'rgba(216,180,254,0)'); lg.addColorStop(1,`rgba(248,215,255,${vis*df*1.65})`); ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(hx,hy); ctx.strokeStyle=lg; ctx.lineWidth=0.8; ctx.stroke();
      const dg=ctx.createRadialGradient(hx,hy,0,hx,hy,1.8); dg.addColorStop(0,`rgba(255,235,255,${vis*df*1.45})`); dg.addColorStop(1,'rgba(200,150,255,0)');
      ctx.beginPath(); ctx.arc(hx,hy,1.8,0,Math.PI*2); ctx.fillStyle=dg; ctx.fill();
    });
    pn.forEach(n=>{
      if(n.z<-0.18) return; const a=Math.max(0,Math.min(1,(n.z+0.18)/1.0))*0.85;
      const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,2.1); ng.addColorStop(0,`rgba(216,180,254,${a*0.72})`); ng.addColorStop(1,'rgba(139,92,246,0)');
      ctx.beginPath(); ctx.arc(n.x,n.y,2.1,0,Math.PI*2); ctx.fillStyle=ng; ctx.fill();
      ctx.beginPath(); ctx.arc(n.x,n.y,0.68,0,Math.PI*2); ctx.fillStyle=`rgba(240,210,255,${a})`; ctx.fill();
    });
    const sh=ctx.createRadialGradient(CX-3.5,CY-3.5,0.2,CX-1,CY-1,R*0.85); sh.addColorStop(0,'rgba(255,255,255,0.10)'); sh.addColorStop(0.4,'rgba(255,255,255,0.03)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=sh; ctx.fill();
    if(!rk.isBehind){ drawTail(); drawRocket(rk); }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ─── ORYN COMET TEXT EFFECT ─── */
(function(){
  document.fonts.ready.then(init);
  function init(){
    const span = document.getElementById('orynSpan'); const cv = document.getElementById('orynComet'); if(!span||!cv) return;
    const DPR = Math.min(window.devicePixelRatio||1, 3); let W, H, FS;
    function resize(){
      W  = span.offsetWidth  || 64; H  = span.offsetHeight || 24; FS = parseFloat(getComputedStyle(span).fontSize) || 22;
      cv.width  = Math.round(W*DPR); cv.height = Math.round(H*DPR); cv.style.width  = W+'px'; cv.style.height = H+'px';
    }
    resize(); window.addEventListener('resize', resize);
    const ctx = cv.getContext('2d');
    function buildGlyphPathRaw(){
      const SCALE = 4; const OW = Math.ceil(W*SCALE), OH = Math.ceil(H*SCALE);
      const oc = document.createElement('canvas'); oc.width=OW; oc.height=OH; const ox=oc.getContext('2d');
      ox.clearRect(0,0,OW,OH); ox.font=`700 ${FS*SCALE}px Outfit,sans-serif`; ox.fillStyle='#fff'; ox.textBaseline='middle'; ox.fillText('ORYN', 0, OH/2);
      const id=ox.getImageData(0,0,OW,OH); const d=id.data; const filled=(x,y)=>{ if(x<0||y<0||x>=OW||y>=OH) return false; return d[(y*OW+x)*4+3]>30; };
      const topPts=[], botPts=[];
      for(let x=0;x<OW;x++){
        let top=-1, bot=-1;
        for(let y=0;y<OH;y++){ if(filled(x,y)){top=y;break;} }
        for(let y=OH-1;y>=0;y--){ if(filled(x,y)){bot=y;break;} }
        if(top>=0){ topPts.push({x:x/SCALE, y:top/SCALE}); botPts.push({x:x/SCALE, y:bot/SCALE}); }
      }
      if(topPts.length===0) return null;
      const outline=[...topPts, ...[...botPts].reverse(), topPts[0]];
      const total = outline.length; const TARGET = 200; const step = total / TARGET; const simplified = [];
      for(let i=0;i<TARGET;i++){ simplified.push(outline[Math.round(i*step) % total]); }
      simplified.push(simplified[0]); return simplified;
    }
    function catmull(pts, stepsPerSeg){
      const out=[], n=pts.length;
      for(let i=0;i<n-1;i++){
        const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(n-1,i+2)];
        for(let j=0;j<stepsPerSeg;j++){
          const t=j/stepsPerSeg, t2=t*t, t3=t2*t;
          const x=0.5*((-p0.x+3*p1.x-3*p2.x+p3.x)*t3+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+p2.x)*t+2*p1.x);
          const y=0.5*((-p0.y+3*p1.y-3*p2.y+p3.y)*t3+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+p2.y)*t+2*p1.y);
          out.push({x,y});
        }
      }
      out.push(pts[n-1]); return out;
    }
    function resampleByArcLength(pts, targetCount){
      const lens=[0]; for(let i=1;i<pts.length;i++){ const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y; lens.push(lens[i-1]+Math.sqrt(dx*dx+dy*dy)); }
      const total=lens[lens.length-1]; const out=[];
      for(let k=0;k<targetCount;k++){
        const target=(k/targetCount)*total; let lo=0, hi=lens.length-1;
        while(hi-lo>1){ let mid=(lo+hi)>>1; if(lens[mid]<=target) lo=mid; else hi=mid; }
        const t=(target-lens[lo])/(lens[hi]-lens[lo]||1); out.push({ x:pts[lo].x+(pts[hi].x-pts[lo].x)*t, y:pts[lo].y+(pts[hi].y-pts[lo].y)*t });
      }
      out.push(out[0]); return out;
    }
    let path = null;
    function buildPath(){
      const raw = buildGlyphPathRaw(); if(!raw) return;
      const smooth = catmull(raw, 5); path = resampleByArcLength(smooth, 600);
    }
    buildPath();
    const TAIL_LEN = 120; const tailX = new Float32Array(TAIL_LEN); const tailY = new Float32Array(TAIL_LEN); let tPtr = 0, tFill = 0;
    function pushTail(x,y){ tailX[tPtr]=x; tailY[tPtr]=y; tPtr=(tPtr+1)%TAIL_LEN; if(tFill<TAIL_LEN) tFill++; }
    let pathIdx  = 0; let phase = 'run'; let pauseT = 0; const STEP_PER_SEC = 28; const PAUSE_DUR = 2.5;
    function reset(){ tFill=0; tPtr=0; pathIdx=0; phase='run'; buildPath(); }
    let lastTS=null;
    function draw(ts){
      const dt = lastTS===null ? 0.016 : Math.min((ts-lastTS)/1000, 0.05); lastTS = ts;
      ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,W,H);
      if(phase==='pause'){ pauseT -= dt; if(pauseT<=0) reset(); requestAnimationFrame(draw); return; }
      if(!path || path.length<2){ requestAnimationFrame(draw); return; }
      pathIdx += STEP_PER_SEC * dt;
      if(pathIdx >= path.length - 1){ phase='pause'; pauseT=PAUSE_DUR; requestAnimationFrame(draw); return; }
      const i0 = Math.floor(pathIdx); const fr = pathIdx - i0; const i1 = Math.min(i0+1, path.length-1);
      const px = path[i0].x + (path[i1].x-path[i0].x)*fr; const py = path[i0].y + (path[i1].y-path[i0].y)*fr;
      pushTail(px, py);
      ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
      const tailCount = Math.min(tFill, TAIL_LEN);
      for(let ti=1; ti<tailCount; ti++){
        const idxA = (tPtr - ti + TAIL_LEN) % TAIL_LEN; const idxB = (tPtr - ti - 1 + TAIL_LEN) % TAIL_LEN; const tf = ti / TAIL_LEN;
        const alpha = Math.pow(1-tf, 1.6) * 0.39; const lw = Math.pow(1-tf, 0.7) * 2.2 + 0.12; if(alpha < 0.006) break;
        ctx.shadowColor = 'rgba(255,248,200,' + (alpha*0.5) + ')'; ctx.shadowBlur = tf * 9;
        const cr = 255; const cg = Math.round(248 + tf*4); const cb2 = Math.round(230 - tf*80);
        ctx.beginPath(); ctx.moveTo(tailX[idxB], tailY[idxB]); ctx.lineTo(tailX[idxA], tailY[idxA]);
        ctx.strokeStyle = 'rgba(' + cr + ',' + cg + ',' + cb2 + ',' + alpha + ')'; ctx.lineWidth = lw; ctx.stroke();
      }
      ctx.restore();
      ctx.save(); ctx.shadowColor = 'rgba(255,252,200,0.7)'; ctx.shadowBlur = 5;
      const halo = ctx.createRadialGradient(px,py,0,px,py,4.5); halo.addColorStop(0,'rgba(255,255,230,0.11)'); halo.addColorStop(1,'rgba(255,240,160,0)');
      ctx.beginPath(); ctx.arc(px,py,4.5,0,Math.PI*2); ctx.fillStyle=halo; ctx.fill();
      const core = ctx.createRadialGradient(px,py,0,px,py,1.5); core.addColorStop(0,'rgba(255,255,255,0.5)'); core.addColorStop(0.45,'rgba(255,252,210,0.45)'); core.addColorStop(1,'rgba(255,235,140,0)');
      ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fillStyle=core; ctx.fill(); ctx.restore();
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  }
})();
