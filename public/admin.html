<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORYNTech Admin - Golden Standard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <style>
    :root {
      --purple: #8b5cf6; --purple-dark: #7c3aed; --purple-light: #a78bfa;
      --panel: #0f091a; --border: rgba(139, 92, 246, 0.15); --border2: rgba(139, 92, 246, 0.08);
      --text: #ffffff; --muted: #8a84aa; --dim: #5c567a;
      --bg1: #050308; --bg2: #0a0612;
      --lside: 280px; --rside: 320px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter', sans-serif; background:var(--bg1); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
    
    .adm-top { height:60px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:20px; z-index:100; }
    .adm-logo { font-family:'Outfit', sans-serif; font-weight:800; font-size:18px; display:flex; align-items:center; gap:8px; cursor:pointer; }
    .adm-logo span { color:var(--purple); }
    .logo-cv-wrap { width:32px; height:32px; position:relative; }
    canvas#logoCanvas { width:32px; height:32px; }

    .adm-sep { width:1px; height:24px; background:var(--border); margin:0 10px; }
    
    .adm-status { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#10b981; }

    .adm-top-actions { margin-left:auto; display:flex; align-items:center; gap:12px; }
    .adm-btn { height:36px; padding:0 16px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .2s; border:1px solid var(--border); outline:none; }
    .adm-btn-ghost { background:transparent; color:var(--muted); }
    .adm-btn-ghost:hover { color:var(--text); background:rgba(255,255,255,0.05); }
    .adm-btn-primary { background:var(--purple); color:#fff; border-color:var(--purple); }
    .adm-btn-primary:hover { background:var(--purple-dark); box-shadow:0 0 15px rgba(139,92,246,0.3); }

    .adm-body { flex:1; display:flex; overflow:hidden; position:relative; }
    
    .adm-lside { width:var(--lside); background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; }
    .adm-lside-tabs { display:flex; border-bottom:1px solid var(--border); padding:0 12px; height:50px; }
    .adm-ltab { flex:1; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--dim); text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
    .adm-ltab.active { color:var(--purple); border-bottom-color:var(--purple); }

    .adm-lside-body { flex:1; overflow-y:auto; padding:12px; }
    .page-item { display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; margin-bottom:4px; cursor:pointer; transition:all .2s; border:1px solid transparent; }
    .page-item:hover { background:rgba(139,92,246,0.05); }
    .page-item.active { background:rgba(139,92,246,0.1); border-color:rgba(139,92,246,0.2); }
    .page-item .material-symbols-rounded { font-size:18px; color:var(--muted); }
    .page-item.active .material-symbols-rounded { color:var(--purple); }
    .page-item-name { font-size:13px; font-weight:500; }
    .page-item-badge { margin-left:auto; font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; background:rgba(255,255,255,0.05); color:var(--dim); text-transform:uppercase; }
    .page-item.active .page-item-badge { background:var(--purple); color:#fff; }

    .add-page-btn { width:100%; margin-top:12px; height:40px; background:rgba(139,92,246,0.05); border:1px dashed var(--border); border-radius:10px; color:var(--purple); font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; }
    .add-page-btn:hover { background:rgba(139,92,246,0.1); border-style:solid; }

    .adm-canvas { flex:1; background:var(--bg1); display:flex; flex-direction:column; padding:24px; overflow-y:auto; align-items:center; position:relative; }
    .canvas-controls { position:absolute; top:24px; left:24px; display:flex; gap:8px; z-index:10; }
    .adm-dev-btn { width:40px; height:40px; background:var(--panel); border:1px solid var(--border); border-radius:10px; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .adm-dev-btn.active { color:var(--purple); border-color:var(--purple); background:rgba(139,92,246,0.1); }
    
    .canvas-frame { width:100%; max-width:1100px; background:#fff; border-radius:12px; min-height:800px; box-shadow:0 30px 60px rgba(0,0,0,0.5); overflow:hidden; transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .canvas-frame.tablet { max-width:768px; }
    .canvas-frame.mobile { max-width:375px; }

    #canvasContent { width:100%; height:100%; min-height:800px; background:#fff; color:#000; overflow-x:hidden; }

    .adm-rside { width:var(--rside); background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; }
    .adm-rside-head { height:50px; padding:0 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .adm-rside-title { font-size:12px; font-weight:700; text-transform:uppercase; color:var(--dim); letter-spacing:1px; }
    .adm-rside-body { flex:1; overflow-y:auto; padding:20px; }

    .prop-group { margin-bottom:20px; }
    .prop-label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .prop-input, .prop-textarea, .prop-select { width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; color:#fff; padding:10px 12px; font-size:13px; outline:none; transition:all .2s; font-family:inherit; }
    .prop-input:focus, .prop-textarea:focus, .prop-select:focus { border-color:var(--purple); background:rgba(255,255,255,0.05); }
    .prop-textarea { min-height:80px; resize:vertical; }

    .widget-item { display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid var(--border2); margin-bottom:8px; cursor:pointer; transition:all .2s; }
    .widget-item:hover { background:rgba(139,92,246,0.05); border-color:var(--border); transform:translateY(-1px); }
    .widget-item .material-symbols-rounded { font-size:20px; color:var(--purple-light); }
    .widget-item span:last-child { font-size:13px; font-weight:500; }

    /* Login Screen */
    .login-screen { position:fixed; inset:0; background:var(--bg1); z-index:1000; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:400px; background:var(--panel); border:1px solid var(--border); border-radius:24px; padding:40px; box-shadow:0 40px 100px rgba(0,0,0,0.8); }
    .login-logo { font-family:'Outfit', sans-serif; font-weight:800; font-size:32px; text-align:center; margin-bottom:32px; }
    .login-logo span { color:var(--purple); }
    .login-title { font-size:24px; font-weight:700; text-align:center; margin-bottom:8px; }
    .login-sub { font-size:14px; color:var(--muted); text-align:center; margin-bottom:32px; }
    .login-error { color:#ef4444; background:rgba(239,68,68,0.1); padding:10px; border-radius:8px; font-size:13px; margin-bottom:20px; text-align:center; display:none; }

    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--panel); border:1px solid var(--purple); color:#fff; padding:12px 24px; border-radius:12px; display:flex; align-items:center; gap:12px; font-size:14px; transition:all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index:2000; opacity:0; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:1500; display:none; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-card { width:100%; max-width:480px; background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:30px; animation: modalPop 0.3s ease-out; }
    @keyframes modalPop { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }

    /* Editor Specifics from oryntech-editor.html styles */
    .editor-section { position:relative; border:2px solid transparent; transition:all .15s; }
    .editor-section:hover { border-color:rgba(124,58,237,.3); }
    .editor-section.selected { border-color:var(--purple); border-style:solid; }
    .sec-toolbar { position:absolute; top:-30px; right:0; background:var(--purple); color:#fff; display:none; gap:5px; padding:4px 8px; border-radius:6px 6px 0 0; font-size:12px; z-index:10; }
    .editor-section.selected .sec-toolbar { display:flex; }
    .sec-btn { background:none; border:none; color:#fff; cursor:pointer; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">ORYN<span>Tech</span></div>
    <div class="login-title">Admin Editor</div>
    <div class="login-sub">Autentifică-te pentru a continua</div>
    <div class="login-error" id="loginError"></div>
    <div class="prop-group">
      <label class="prop-label">Email</label>
      <input class="login-input prop-input" type="email" id="loginEmail" placeholder="admin@oryntech.ai">
    </div>
    <div class="prop-group">
      <label class="prop-label">Parolă</label>
      <input class="login-input prop-input" type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="adm-btn adm-btn-primary" style="width:100%; height:48px; justify-content:center; margin-top:10px;" id="loginBtn">
      <span class="material-symbols-rounded">lock_open</span> Intră în Admin
    </button>
  </div>
</div>

<!-- TOPBAR -->
<div class="adm-top">
  <div class="adm-logo" onclick="location.reload()">
    <div class="logo-cv-wrap"><canvas id="logoCanvas"></canvas></div>
    ORYN<span>Tech</span> Admin
  </div>
  <div class="adm-sep"></div>
  <div class="adm-status">
    <div class="status-dot" id="saveDot"></div>
    <span id="saveStatusText">Sistem pregătit</span>
  </div>
  <div class="adm-top-actions">
    <button class="adm-btn adm-btn-ghost" id="previewBtn"><span class="material-symbols-rounded">visibility</span> Vizualizare</button>
    <button class="adm-btn adm-btn-ghost" id="saveBtn"><span class="material-symbols-rounded">save</span> Salvează</button>
    <button class="adm-btn adm-btn-primary" id="publishBtn"><span class="material-symbols-rounded">rocket_launch</span> Publică</button>
  </div>
</div>

<div class="adm-body">
  <!-- LEFT SIDEBAR -->
  <div class="adm-lside">
    <div class="adm-lside-tabs">
      <div class="adm-ltab active" data-ltab="pages">Pagini</div>
      <div class="adm-ltab" data-ltab="widgets">Widgets</div>
    </div>
    <div class="adm-lside-body">
      <div id="pagesTab">
        <div class="page-item active"><span class="material-symbols-rounded">home</span>Homepage</div>
      </div>
      <div id="widgetsTab" style="display:none;">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="adm-canvas">
    <div class="canvas-controls">
      <button class="adm-dev-btn active" data-device="desktop"><span class="material-symbols-rounded">desktop_windows</span></button>
      <button class="adm-dev-btn" data-device="tablet"><span class="material-symbols-rounded">tablet_mac</span></button>
      <button class="adm-dev-btn" data-device="mobile"><span class="material-symbols-rounded">smartphone</span></button>
    </div>
    <div class="canvas-frame" id="canvasFrame">
      <div style="background:var(--panel); padding:8px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted);">
        <span class="material-symbols-rounded" style="font-size:16px;">edit</span>
        Editezi: <strong id="currentPageLabel" style="color:#fff">Homepage</strong>
        <span style="opacity:0.3; margin-left:auto;" id="currentPageUrl">/index.html</span>
      </div>
      <div id="canvasContent"></div>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="adm-rside">
    <div class="adm-rside-head">
      <span class="adm-rside-title">Proprietăți</span>
      <span class="material-symbols-rounded" style="font-size:18px; color:var(--dim)">settings</span>
    </div>
    <div class="adm-rside-body" id="propBody">
      <!-- Properties injected here -->
    </div>
  </div>
</div>

<!-- MODAL ADD PAGE -->
<div class="modal-overlay" id="addPageModal">
  <div class="modal-card">
    <h3 style="margin-bottom:20px;">Creează pagină nouă</h3>
    <div class="prop-group">
      <label class="prop-label">Nume pagină</label>
      <input class="prop-input" type="text" id="newPageName" placeholder="ex: Servicii CRM">
    </div>
    <div class="prop-group">
      <label class="prop-label">Slug (URL)</label>
      <input class="prop-input" type="text" id="newPageSlug" placeholder="ex: servicii-crm">
    </div>
    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px;">
      <button class="adm-btn adm-btn-ghost" id="cancelModal">Anulează</button>
      <button class="adm-btn adm-btn-primary" id="confirmAddPage">Creează</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="material-symbols-rounded">check_circle</span>
  <span id="toastMsg">Salvat</span>
</div>

<script type="module">
  import { Editor } from './admin/editor.js';
  import WIDGET_DEFINITIONS from './admin/widgets/definitions.js';
  import { PropertiesPanel } from './admin/properties.js';

  // --- LOGO ANIMATION (Original Canvas) ---
  (function(){
    const cv = document.getElementById('logoCanvas');
    if(!cv) return;
    const SIZE = 44; let DPR = 1;
    function setupCanvas() {
      DPR = Math.min(window.devicePixelRatio || 1, 4);
      cv.width = Math.round(SIZE * DPR); cv.height = Math.round(SIZE * DPR);
      cv.style.width = '32px'; cv.style.height = '32px';
    }
    setupCanvas();
    const ctx = cv.getContext('2d');
    let frameCnt = 0;
    function draw() {
      frameCnt++;
      ctx.clearRect(0,0,cv.width,cv.height);
      const s = cv.width; const cx = s/2; const cy = s/2; const r = s*0.38;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g.addColorStop(0,'#2d1b4e'); g.addColorStop(0.7,'#1a102e'); g.addColorStop(1,'#0f091a');
      ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle='rgba(139,92,246,0.3)'; ctx.lineWidth=2; ctx.stroke();
      const time = frameCnt * 0.015;
      for(let i=0; i<3; i++){
        ctx.beginPath();
        const angle = time + (i * Math.PI/3);
        const rx = r * Math.cos(angle);
        ctx.ellipse(cx,cy,Math.abs(rx),r,angle,0,Math.PI*2);
        ctx.strokeStyle='rgba(139,92,246,0.15)'; ctx.stroke();
      }
      const px = cx + Math.cos(time*2.5)*r*0.8; const py = cy + Math.sin(time*2.5)*r*0.2;
      ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
      requestAnimationFrame(draw);
    }
    draw();
  })();

  // --- APP STATE ---
  const TOKEN_KEY = 'oryn_admin_token';
  const editor = new Editor({
    onStateChange: () => renderCanvas(),
    onSelectionChange: (section) => propPanel.render(section),
    onSaveStatus: (status) => updateSaveStatus(status)
  });

  const propPanel = new PropertiesPanel(
    document.getElementById('propBody'),
    (id, props) => editor.updateProps(id, props)
  );

  // --- AUTH ---
  async function checkAuth() {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { showLoginScreen(); return; }
    try {
      const res = await fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.ok) { hideLoginScreen(); initApp(); }
      else { localStorage.removeItem(TOKEN_KEY); showLoginScreen(); }
    } catch { initApp(); } // Dev fallback
  }

  function showLoginScreen() { document.getElementById('loginScreen').style.display = 'flex'; }
  function hideLoginScreen() { document.getElementById('loginScreen').style.display = 'none'; }

  // --- INITIALIZATION ---
  async function initApp() {
    await loadPages();
    initUIEvents();
    // Load default or first
    const first = document.querySelector('.page-item');
    if (first) first.click();
  }

  async function loadPages() {
    const list = document.getElementById('pagesTab');
    if(!list) return;
    list.innerHTML = '';
    try {
      const res = await fetch('/api/pages', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY) } });
      const pages = await res.json();
      pages.forEach(p => {
        const div = document.createElement('div');
        div.className = 'page-item';
        div.onclick = () => selectPage(p.slug, div);
        div.innerHTML = `<span class="material-symbols-rounded">${p.slug==='index'?'home':'description'}</span><span class="page-item-name">${p.name||p.slug}</span><span class="page-item-badge">${p.slug==='index'?'Live':'Draft'}</span>`;
        list.appendChild(div);
      });
    } catch (e) { console.error('Error loading pages:', e); }
    
    const addBtn = document.createElement('button');
    addBtn.className = 'add-page-btn';
    addBtn.innerHTML = '<span class="material-symbols-rounded">add</span> Pagină nouă';
    addBtn.onclick = () => document.getElementById('addPageModal').classList.add('open');
    list.appendChild(addBtn);
  }

  async function selectPage(slug, el) {
    document.querySelectorAll('.page-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('currentPageLabel').textContent = el.querySelector('.page-item-name').textContent;
    document.getElementById('currentPageUrl').textContent = '/' + slug;
    
    try {
      const res = await fetch(`/api/pages/${slug}`, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY) } });
      const pageData = await res.json();
      editor.loadPage(pageData);
    } catch (e) { showToast('Eroare la încărcare page'); }
  }

  function renderCanvas() {
    const container = document.getElementById('canvasContent');
    if (!container || !editor.state) return;
    container.innerHTML = editor.renderer.renderPage(editor.state);
    
    container.querySelectorAll('.editor-section').forEach(sec => {
      sec.addEventListener('click', (e) => {
        e.stopPropagation();
        editor.select(sec.dataset.sectionId);
      });
    });
  }

  function initUIEvents() {
    // Tabs
    document.querySelectorAll('.adm-ltab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.adm-ltab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isWidgets = tab.dataset.ltab === 'widgets';
        document.getElementById('pagesTab').style.display = isWidgets ? 'none' : 'block';
        document.getElementById('widgetsTab').style.display = isWidgets ? 'block' : 'none';
      };
    });

    // Device
    document.querySelectorAll('.adm-dev-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.adm-dev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('canvasFrame').className = 'canvas-frame ' + (btn.dataset.device !== 'desktop' ? btn.dataset.device : '');
      };
    });

    // Widgets
    const wTab = document.getElementById('widgetsTab');
    if(wTab) {
      wTab.innerHTML = '';
      WIDGET_DEFINITIONS.forEach(w => {
        const div = document.createElement('div');
        div.className = 'widget-item';
        div.innerHTML = `<span class="material-symbols-rounded">${w.icon}</span><span>${w.name}</span>`;
        div.onclick = () => editor.addSection(w.type);
        wTab.appendChild(div);
      });
    }

    // Modal
    document.getElementById('cancelModal').onclick = () => document.getElementById('addPageModal').classList.remove('open');
    document.getElementById('confirmAddPage').onclick = async () => {
      const name = document.getElementById('newPageName').value;
      const slug = document.getElementById('newPageSlug').value;
      if(!name || !slug) return;
      try {
        const res = await fetch('/api/pages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY) },
          body: JSON.stringify({ name, slug, sections: [] })
        });
        if(res.ok) { location.reload(); }
      } catch (e) { showToast('Eroare la creare pagină'); }
    };

    // Actions
    document.getElementById('saveBtn').onclick = () => editor.savePage();
    document.getElementById('publishBtn').onclick = () => editor.publishPage();
    document.getElementById('previewBtn').onclick = () => { if(editor.state) window.open('/' + editor.state.slug, '_blank'); };
  }

  function updateSaveStatus(status) {
    const dot = document.getElementById('saveDot');
    const text = document.getElementById('saveStatusText');
    if (!dot || !text) return;
    const map = {
      'saved': { col: '#10b981', txt: 'Modificări salvate' },
      'dirty': { col: '#fbbf24', txt: 'Salvează modificările' },
      'saving': { col: '#3b82f6', txt: 'Se salvează...' }
    };
    dot.style.background = map[status].col;
    text.textContent = map[status].txt;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const err = document.getElementById('loginError');
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if(res.ok) { localStorage.setItem(TOKEN_KEY, data.token); hideLoginScreen(); initApp(); }
      else { err.textContent = data.error; err.style.display = 'block'; }
    } catch { err.textContent = 'Eroare server'; err.style.display = 'block'; }
  };

  checkAuth();
</script>
</body>
</html>
